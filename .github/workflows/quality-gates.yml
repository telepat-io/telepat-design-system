name: Quality Gates

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use for validation
        required: false
        type: string
        default: "20"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
