<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Surfaces</title></head>
<body>
<div class="card black" style="padding: 0; gap: 0; flex-direction: row; height: 200px;">
  <div style="flex: 1; background: #000000; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff;">
    <div style="font-size: 13px; font-weight: 500;">Black</div>
    <div class="mono" style="opacity: 0.6;">#000000</div>
  </div>
  <div style="flex: 1; background: #14102B; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; border-left: 1px solid rgba(255,255,255,0.04);">
    <div style="font-size: 13px; font-weight: 500;">Deep purple-black</div>
    <div class="mono" style="opacity: 0.7;">#14102B</div>
  </div>
  <div style="flex: 1; background: #221949; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; border-left: 1px solid rgba(255,255,255,0.06);">
    <div style="font-size: 13px; font-weight: 500;">Elevated</div>
    <div class="mono" style="opacity: 0.75;">#221949</div>
  </div>
  <div style="flex: 1; background: #FFFFFF; padding: 16px; display: flex; flex-direction: column; justify-content: flex-end; color: #000; border-left: 1px solid #eee;">
    <div style="font-size: 13px; font-weight: 500;">White</div>
    <div class="mono" style="opacity: 0.6;">#FFFFFF</div>
  </div>
</div>
</body></html>
