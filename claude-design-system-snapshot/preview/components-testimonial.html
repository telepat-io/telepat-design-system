<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Testimonial card</title></head>
<body>
<div class="card black" style="padding: 24px; height: 280px; align-items: center; justify-content: center;">
  <div style="width: 100%; border-radius: 16px; padding: 28px 32px;
              background:
                linear-gradient(rgba(33,26,61,0.85) 0%, rgba(15,2,25,0.85) 29%, rgba(15,2,25,0.85) 67%, rgba(41,35,67,0.85) 100%),
                rgba(255,255,255,0.18);
              backdrop-filter: blur(50px);
              display: flex; gap: 24px; align-items: center;">
    <div style="width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
                background: linear-gradient(135deg, #4F4BFF 0%, #DB4BFF 100%);
                display: flex; align-items: center; justify-content: center;
                color: #fff; font: 500 22px var(--font-display); letter-spacing: 0.04em;">SS</div>
    <div style="display: flex; flex-direction: column; gap: 10px; color: #fff;">
      <div style="font: italic 300 20px/28px var(--font-display);">"Overall, I would say that we wouldn't have been able to generate this kind of success if Telepat wasn't there."</div>
      <div style="font: 400 16px/20px var(--font-display); letter-spacing: 0.04em;">Sarah Schaaf <span style="font-weight: 300; opacity: 0.85;"> · CEO, Headnote</span></div>
    </div>
  </div>
</div>
</body></html>
