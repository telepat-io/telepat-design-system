<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Brand pair</title></head>
<body>
<div class="card black" style="padding: 0; gap: 0; height: 210px; flex-direction: row;">

  <div style="flex: 1; background: #DB4BFF; padding: 18px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff;">

  </div>
