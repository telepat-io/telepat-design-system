<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Radius scale</title></head>
<body>
<div class="card black" style="gap: 16px;">
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-items: end;">
    <div style="height: 70px; background: #4F4BFF; border-radius: 8px;"></div>
    <div style="height: 70px; background: #DB4BFF; border-radius: 16px;"></div>
    <div style="height: 70px; background: #5A3ECC; border-radius: 24px;"></div>
    <div style="height: 70px; width: 70px; margin: 0 auto; background: linear-gradient(135deg, #CF83F4, #E11E8D); border-radius: 500px;"></div>
    <div style="height: 70px; background: #15101F; border: 1px solid var(--color-line); border-radius: 8px 8px 10px 10px;"></div>
  </div>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; font: 500 11px var(--font-ui); color: var(--color-fg-muted); text-align: center;">
    <div>8 input</div><div>16 card</div><div>24 deck img</div><div>500 pill</div><div>8/8/10/10 tab</div>
  </div>
</div>
</body></html>
