<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Hairlines + dividers</title></head>
<body>
<div class="card black" style="gap: 22px; padding: 32px;">
  <div style="display: flex; flex-direction: column; gap: 8px;">
    <div class="tinytag">1.5px solid rgba(255,255,255,0.16) — hairline on dark</div>
    <div style="height: 1.5px; background: rgba(255,255,255,0.16); border-radius: 1px;"></div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 8px; background: #fff; padding: 16px; border-radius: 6px;">
    <div class="tinytag dark">2px solid rgba(0,0,0,0.14) — divider on light</div>
    <div style="height: 2px; background: rgba(0,0,0,0.14); border-radius: 1px;"></div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 8px;">
    <div class="tinytag">1.5px solid #E3E3E3 — button outline on light</div>
    <div style="height: 1.5px; background: #E3E3E3; border-radius: 1px;"></div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 8px;">
    <div class="tinytag">1.5px dashed rgba(255,255,255,0.32) — dropzone on dark</div>
    <div style="height: 36px; border: 1.5px dashed rgba(255,255,255,0.32); border-radius: 8px;"></div>
  </div>
</div>
</body></html>
