<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons</title></head>
<body>
<div class="card black" style="gap: 22px; padding: 36px 32px; align-items: center;">
  <div style="display: flex; gap: 20px; align-items: center;">
    <button style="background: #5A3ECC; color: #fff; border: none; border-radius: 16px; padding: 13px 57px; font: 400 16px/24px var(--font-display); letter-spacing: 0.04em;">Send</button>
    <button style="background: transparent; color: #fff; border: 1.5px solid #E3E3E3; border-radius: 8px; padding: 10px 24px; font: 500 16px/24px var(--font-display);">Clear</button>
    <button style="background: #000; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font: 500 16px/24px var(--font-display);">Perform Analysis</button>
  </div>
  <div class="tinytag" style="text-align: center;">Primary CTA: violet pill — Outlines: 8px radius on light surfaces</div>
</div>
</body></html>
