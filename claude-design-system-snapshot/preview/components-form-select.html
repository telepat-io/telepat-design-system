<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_forms.css"><title>Select &amp; multi-line</title></head>
<body>
<div class="specimen">

  <div class="field">
    <span class="field-label">Service interest</span>
    <select class="select">
      <option>AI Concepts &amp; Software</option>
      <option>AI Visuals &amp; Voice</option>
      <option>Security &amp; Infrastructure</option>
    </select>
  </div>

  <div class="field">
    <span class="field-label">Engagement start</span>
    <input class="input" type="date" value="2026-06-01">
  </div>

  <div class="field full">
    <span class="field-label">Project brief</span>
    <textarea class="input" rows="3">We need an autonomous agent for our e-com storefront.</textarea>
  </div>

</div>
</body></html>
